<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lower Body Stretching Flow</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header>
        <h1>Lower Body Stretching Routine</h1>
        <p id="stepMeta">Step 1 of 13</p>
      </header>

      <section class="video-wrap">
        <div id="ytPlayer" aria-label="Stretching Video"></div>
      </section>

      <section class="info-panel">
        <h2 id="exerciseName"></h2>
        <div class="timer" id="timer">00:00</div>
        <p id="exerciseHint">Routine auto mode is ON. Videos and next steps move automatically.</p>
      </section>

      <section class="controls" id="activeControls">
        <button id="skipExerciseBtn" type="button">Skip Exercise</button>
        <button id="skipRestBtn" type="button" disabled>Skip Rest</button>
        <button id="addRestBtn" type="button" disabled>+10s Rest</button>
      </section>

      <section class="rest-visual hidden" id="restVisual" aria-live="polite">
        <div class="rest-ring"><span id="restSecondsText">10</span>s</div>
        <p>Recovery in progress...</p>
      </section>

      <section class="finish hidden" id="finishSection">
        <h3>Great job! 🎉</h3>
        <p>All exercises are complete. Tap below to go back to the main website.</p>
        <a id="finalLink" href="https://herbalife-smart-wellness-studio.my.canva.site/page-4" target="_blank" rel="noopener noreferrer">Back to Main Website</a>
      </section>

      <ol id="exerciseList" class="hidden-progress" aria-hidden="true"></ol>
    </main>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="app.js"></script>
  </body>
</html>
